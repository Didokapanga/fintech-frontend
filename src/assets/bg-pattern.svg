<svg xmlns="http://www.w3.org/2000/svg"
     width="1920" height="1080"
     viewBox="0 0 1920 1080"
     preserveAspectRatio="xMidYMid slice">

  <defs>
    <!-- Fond -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9e3f8"/>
      <stop offset="100%" stop-color="#889ab4"/>
    </linearGradient>

    <!-- Pattern ICONS amélioré -->
    <pattern id="patternIcons"
             width="240" height="180"
             patternUnits="userSpaceOnUse"
             patternTransform="rotate(-25)">

      <!-- Ligne 1 (compacte) -->
      <g opacity="0.18">

        <!-- Graph -->
        <polyline points="15,40 30,28 45,35 60,18"
                  fill="none"
                  stroke="#2f6fed"
                  stroke-width="3"/>

        <!-- User -->
        <circle cx="95" cy="32" r="8" fill="#2f6fed"/>
        <rect x="87" y="42" width="16" height="10" rx="5" fill="#2f6fed"/>

        <!-- Chat -->
        <rect x="130" y="25" width="24" height="16" rx="4"
              fill="#2f6fed"/>
        <polygon points="135,41 140,47 145,41"
                 fill="#2f6fed"/>

      </g>

      <!-- Ligne 2 (décalage asymétrique) -->
      <g opacity="0.18">

        <!-- Carte -->
        <rect x="50" y="105" width="30" height="18" rx="4"
              fill="#d6b48a"/>
        <rect x="50" y="110" width="30" height="4"
              fill="#fff" opacity="0.4"/>

        <!-- Sync -->
        <path d="M115 110 A10 10 0 1 1 125 120"
              stroke="#2f6fed"
              stroke-width="3"
              fill="none"/>
        <polygon points="125,120 120,117 120,123"
                 fill="#2f6fed"/>

        <!-- Money -->
        <circle cx="170" cy="112" r="10"
                fill="#d6b48a"/>
        <text x="166" y="116"
              font-size="10"
              fill="#fff">$</text>

      </g>

      <!-- Ligne 3 (cassure visuelle → effet premium) -->
      <g opacity="0.15">

        <!-- Mini user -->
        <circle cx="20" cy="150" r="6" fill="#2f6fed"/>
        <rect x="15" y="155" width="10" height="6" rx="3" fill="#2f6fed"/>

        <!-- Mini graph -->
        <polyline points="60,150 70,140 80,145 90,135"
                  fill="none"
                  stroke="#2f6fed"
                  stroke-width="2"/>

        <!-- Mini card -->
        <rect x="110" y="145" width="20" height="12" rx="3"
              fill="#d6b48a"/>

      </g>

    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Pattern -->
  <rect width="100%" height="100%" fill="url(#patternIcons)" />

</svg>
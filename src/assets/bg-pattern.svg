<svg xmlns="http://www.w3.org/2000/svg"
     width="1920" height="1080"
     viewBox="0 0 1920 1080"
     preserveAspectRatio="xMidYMid slice">

  <defs>
    <!-- Fond gris clair -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#adc8ff"/>
      <stop offset="100%" stop-color="#5c87c7"/>
    </linearGradient>

    <!-- Pattern parfaitement aligné -->
    <pattern id="patternText"
             width="260" height="160"
             patternUnits="userSpaceOnUse"
             patternTransform="rotate(-25)">

      <!-- Ligne 1 -->
      <text x="0" y="40"
            font-size="22"
            font-family="Segoe UI, Arial, sans-serif">
        <tspan fill="#2f6fed" opacity="0.22">Global</tspan>
        <tspan fill="#d6b48a" opacity="0.22"> fintech</tspan>
      </text>

      <!-- Ligne 2 (décalée pour alignement diagonal parfait) -->
      <text x="40" y="100"
            font-size="22"
            font-family="Segoe UI, Arial, sans-serif">
        <tspan fill="#2f6fed" opacity="0.22">Global</tspan>
        <tspan fill="#d6b48a" opacity="0.22"> fintech</tspan>
      </text>

    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Pattern -->
  <rect width="100%" height="100%" fill="url(#patternText)" />

</svg>